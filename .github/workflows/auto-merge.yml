name: Auto Merge

on:
  # Trigger when labels change
  pull_request:
    types: [labeled, unlabeled, closed]
    branches: [main]
  # Trigger when review status changes
  pull_request_review:
    types: [submitted]
  # Trigger when commit statuses complete (ai-review/critical-findings)
  status: {}
  # Trigger when CI workflows complete (validate job etc.)
  # workflow_run fires even for Actions-created check suites, unlike check_suite
  workflow_run:
    workflows: ["Validate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_EVENT: ${{ github.event.pull_request.number }}
          COMMIT_SHA_STATUS: ${{ github.event.commit.sha }}
          COMMIT_SHA_WORKFLOW: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "status" ] || [ "$EVENT_NAME" = "workflow_run" ]; then
            # Find PRs associated with this commit
            SHA="${COMMIT_SHA_STATUS:-$COMMIT_SHA_WORKFLOW}"
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
              --jq '.[0].number' 2>/dev/null || echo "")
          else
            PR_NUMBER="$PR_NUMBER_EVENT"
          fi

          if [ -z "$PR_NUMBER" ] || ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "No valid PR found, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check auto-merge eligibility
        if: steps.pr.outputs.skip != 'true'
        id: eligible
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          # Get PR labels
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')

          # Check for no-auto-merge escape hatch
          if echo "$LABELS" | grep -qx "no-auto-merge"; then
            echo "PR has no-auto-merge label, disabling auto-merge"
            gh pr merge "$PR_NUMBER" --disable-auto 2>/dev/null || true
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for risk:low label
          if ! echo "$LABELS" | grep -qx "risk:low"; then
            echo "PR is not risk:low, disabling auto-merge"
            gh pr merge "$PR_NUMBER" --disable-auto 2>/dev/null || true
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for blocking reviews (latest state per reviewer)
          CHANGES_REQUESTED=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews | group_by(.author.login) | .[] | sort_by(.submittedAt) | last | select(.state == "CHANGES_REQUESTED")] | length')
          if [ "$CHANGES_REQUESTED" != "0" ]; then
            echo "PR has unresolved changes-requested reviews, blocking auto-merge"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check all status checks passed
          CHECKS_PENDING=$(gh pr checks "$PR_NUMBER" --json name,state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

          if [ "$CHECKS_PENDING" != "0" ]; then
            echo "Not all checks passed yet"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check AI review commit status (fail-closed: absent = block)
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          AI_STATUS=$(gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            --jq '[.[] | select(.context == "ai-review/critical-findings")] | sort_by(.updated_at) | last | .state' \
            2>/dev/null || echo "")

          if [ "$AI_STATUS" != "success" ]; then
            echo "AI review status is '${AI_STATUS:-absent}', blocking auto-merge"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR is eligible for auto-merge"
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.eligible.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          # Enable auto-merge with squash strategy
          gh pr merge "$PR_NUMBER" --auto --squash
          echo "Auto-merge enabled for PR #${PR_NUMBER}"

  # Add audit label only after PR is actually merged via auto-merge
  audit-label:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Check if auto-merged and add label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          # auto-merge merges as github-actions[bot]; merge-queue as github-merge-queue[bot]
          if [ "$MERGED_BY" != "github-actions[bot]" ] && [ "$MERGED_BY" != "github-merge-queue[bot]" ]; then
            echo "PR was manually merged by ${MERGED_BY}, skipping audit label"
            exit 0
          fi
          gh label create "auto-merged" --force --color "6f42c1" \
            --description "PR was automatically merged" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "auto-merged"
          echo "Added auto-merged label to PR #${PR_NUMBER}"
