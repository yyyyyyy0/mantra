name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vitest coverage provider
        run: npm install --no-save --no-package-lock @vitest/coverage-v8

      - name: Validate assets
        run: npm run validate

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run unit and contract tests with coverage gate
        run: npm run test:coverage

      - name: Run onboarding smoke
        run: npm run smoke:onboarding
